name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-modules:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $asset = $latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" } | Select-Object -First 1
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          Write-Host "Detected PowerToys version: $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            if ($catalog.version -eq "${{ steps.get_version.outputs.version }}") {
              echo "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "Catalog already at version $version. Skipping."
              return
            }
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading PowerToys installer..."
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"

      - name: Build Shadow Proxy DLL
        if: steps.check_version.outputs.skip != 'true'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`vswhere.exe -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do (
            set "vs_path=%%i"
          )
          call "%vs_path%\VC\Auxiliary\Build\vcvars64.bat"
          cl.exe /LD src/modules/shadow_proxy/main.cpp /Fe:src/modules/shadow_proxy/shadow_proxy.dll /EHsc

      - name: Extract Modules (Professional Administrative Extraction)
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        env:
          WIX_ACCEPT_OSMF_EULA: 1
        run: |
          Write-Host "--- Stage 1: Toolchain Setup ---"
          dotnet tool uninstall --global wix | Out-Null
          dotnet tool install --global wix --version 5.0.2
          
          Write-Host "--- Stage 2: Breaking the Burn Bundle ---"
          mkdir raw_payload -Force
          wix burn extract PowerToysSetup.exe -o raw_payload
          
          # 寻找真正的 MSI 文件
          $msiPath = Get-ChildItem -Path "raw_payload" -Filter "*.msi" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($null -eq $msiPath) { throw "MSI payload not found in bundle." }
          Write-Host "Found MSI: $msiPath"

          Write-Host "--- Stage 3: Official Administrative Extraction ---"
          # 使用 msiexec /a 还原真实的文件夹结构
          $msiInstallDir = "$env:GITHUB_WORKSPACE\msi_extracted"
          mkdir $msiInstallDir -Force
          $process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/a", "`"$msiPath`"", "/qb", "TARGETDIR=`"$msiInstallDir`"" -PassThru -Wait
          if ($process.ExitCode -ne 0) { throw "msiexec failed with code $($process.ExitCode)" }

          Write-Host "--- Stage 4: Location Discovery ---"
          # 寻找解压后的 modules 文件夹
          $modulesTarget = Get-ChildItem -Path "$msiInstallDir" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1
          if ($null -eq $modulesTarget) {
              Write-Error "Could not find modules folder. Listing tree for investigation:"
              Get-ChildItem -Path "$msiInstallDir" -Recurse | Select-Object FullName
              throw "Final path resolution failed."
          }
          
          $sourcePath = $modulesTarget.FullName
          Write-Host "SUCCESS: Target identified at $sourcePath"

          # 执行我们的提取工具
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$sourcePath" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/modules/"

      - name: Create Final User-Ready Bundle
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Assembling the final bundle..."
          $bundleName = "O-PowerToys-v${{ steps.get_version.outputs.version }}"
          mkdir $bundleName -Force
          
          # 寻找 Runner 所在的根目录并拷贝
          $ptRoot = Get-ChildItem -Path "msi_extracted" -Filter "PowerToys.exe" -Recurse | Select-Object -First 1 | ForEach-Object { $_.Directory.FullName }
          Copy-Item -Path "$ptRoot\*" -Destination $bundleName -Recurse -Force
          
          # 覆盖影子模块和安装脚本
          mkdir "$bundleName\service" -Force
          Copy-Item -Path "dist/service/*" -Destination "$bundleName\service" -Recurse -Force
          Expand-Archive -Path "publish_dist/shadow_proxy.zip" -DestinationPath "$bundleName" -Force
          Copy-Item -Path "src/installer/PowerToys-Setup.ps1" -Destination "$bundleName\Install-O-PowerToys.ps1"
          Copy-Item -Path "publish_dist/catalog.json" -Destination $bundleName
          
          # 最终压缩打包
          $zipPath = "publish_dist/O-PowerToys-ReadyToUse-v${{ steps.get_version.outputs.version }}.zip"
          Compress-Archive -Path "$bundleName\*" -DestinationPath $zipPath
          Write-Host "Ready-to-use bundle: $zipPath"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
            publish_dist/O-PowerToys-ReadyToUse-*.zip
          body: |
            ## 🚀 Dynamic PowerToys (Lite Edition) ${{ steps.get_version.outputs.version }}
            全自动生成的“按需下载”版 PowerToys。
            
            ### 📥 如何使用:
            1. 下载下方的 **`O-PowerToys-ReadyToUse-vxxx.zip`** 并解压。
            2. 右键点击 **`Install-O-PowerToys.ps1`**，选择 **“使用 PowerShell 运行”**。
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository Metadata
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: sync catalog to ${{ steps.get_version.outputs.version }}"
          git push
