name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-modules:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $asset = $latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" } | Select-Object -First 1
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          Write-Host "Detected PowerToys version: $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            if ($catalog.version -eq "${{ steps.get_version.outputs.version }}") {
              echo "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "Catalog already at version $version. Skipping."
              return
            }
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading PowerToys installer..."
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"

      - name: Build Shadow Proxy DLL
        if: steps.check_version.outputs.skip != 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl.exe /LD src/modules/shadow_proxy/main.cpp /Fe:src/modules/shadow_proxy/shadow_proxy.dll /EHsc

      - name: Extract Modules (Universal Recursive Extractor)
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        env:
          WIX_ACCEPT_OSMF_EULA: 1
        run: |
          Write-Host "--- Stage 1: Toolchain Setup ---"
          dotnet tool uninstall --global wix | Out-Null
          dotnet tool install --global wix --version 5.0.2
          Write-Host "Using WiX version:"
          wix --version

          Write-Host "--- Stage 2: Multi-Engine Extraction ---"
          mkdir raw_payload -Force
          wix burn extract PowerToysSetup.exe -o raw_payload
          
          # Failsafe: 7-Zip tail-data extraction
          $files = Get-ChildItem -Path "raw_payload" -Recurse
          if ($null -eq $files -or $files.Count -lt 2) {
             7z x PowerToysSetup.exe -oextract_7z -y -t# 
             $searchRoot = "extract_7z"
          } else {
             $searchRoot = "raw_payload"
          }
          
          Write-Host "--- Stage 3: Deep Search and Unpack ---"
          $msi = Get-ChildItem -Path $searchRoot -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msi) {
              Write-Host "MSI detected: $($msi.FullName). Extracting..."
              7z x "$($msi.FullName)" -ofinal_unpack -y
          } else {
              $blob = Get-ChildItem -Path $searchRoot -Recurse | Where-Object { $_.Length -gt 50MB } | Sort-Object Length -Descending | Select-Object -First 1
              7z x "$($blob.FullName)" -ofinal_unpack -y
          }

          Write-Host "--- Stage 4: Location Radar ---"
          $modulesFolder = Get-ChildItem -Path "final_unpack" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1
          if ($null -eq $modulesFolder) { throw "Modules folder not found." }

          $modulesParent = $modulesFolder.FullName
          Write-Host "TARGET ACQUIRED: $modulesParent"

          # 运行提取脚本 (自动包含影子模块打包)
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$modulesParent" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/modules/"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/shadow_proxy.zip
            publish_dist/catalog.json
          body: |
            Automated Dynamic PowerToys Release ${{ steps.get_version.outputs.version }}
            
            This release contains split modules for on-demand installation.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository Metadata
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: sync catalog to ${{ steps.get_version.outputs.version }}"
          git push
