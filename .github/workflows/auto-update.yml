name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *' # 每天午夜运行一次
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  update-modules:
    runs-on: windows-latest
    timeout-minutes: 30 # 安全起见，设置 30 分钟超时
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $downloadUrl = ($latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" }).browser_download_url
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$downloadUrl" >> $env:GITHUB_OUTPUT
          Write-Host "Latest version is $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          $currentVersion = $null
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            $currentVersion = $catalog.version
          }
          if ($currentVersion -eq "${{ steps.get_version.outputs.version }}") {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Version already up to date."
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"

      - name: Extract Modules
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        env:
          WIX_ACCEPT_OSMF_EULA: 1 # 终极武器：如果强行运行了 v7，直接静默接受其开源许可
        run: |
          Write-Host "Cleaning up potential WiX tool conflicts..."
          dotnet tool uninstall --global wix | Out-Null
          
          Write-Host "Installing WiX Toolset CLI v5.0.2..."
          dotnet tool install --global wix --version 5.0.2
          
          # 检查版本确保万无一失
          $wixVersion = wix --version
          Write-Host "Running WiX version: $wixVersion"
          
          Write-Host "Attempting extraction via WiX CLI..."
          mkdir extracted_payload -Force
          # 修正参数顺序：-o 在前，bundle 在后
          wix burn extract -o extracted_payload PowerToysSetup.exe
          
          # 检查 WiX 是否真的提取出了内容
          $files = Get-ChildItem -Path "extracted_payload" -Recurse
          if ($null -eq $files -or $files.Count -lt 2) {
             Write-Warning "WiX extraction produced empty results. Falling back to 7-Zip brute force..."
             7z x PowerToysSetup.exe -oextracted_payload -y
          }
          
          # 第一阶段：在提取物中寻找任意 MSI
          Write-Host "Searching for MSI payload..."
          $msiPath = Get-ChildItem -Path "extracted_payload" -Filter "*.msi" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          if ($null -eq $msiPath) {
             Write-Error "CRITICAL: No MSI found in extracted payload. Directory listing:"
             Get-ChildItem -Path "extracted_payload" -Recurse | Select-Object FullName
             throw "Extraction failed at stage 1."
          }
          Write-Host "Found MSI: $msiPath"

          # 第二阶段：行政提取 MSI 内容
          Write-Host "Extracting MSI contents via msiexec..."
          $msiInstallDir = "$env:GITHUB_WORKSPACE\msi_flat"
          mkdir $msiInstallDir -Force
          $process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/a", "`"$msiPath`"", "/qb", "TARGETDIR=`"$msiInstallDir`"" -PassThru -Wait
          
          if ($process.ExitCode -ne 0) {
             Write-Warning "msiexec failed (code $($process.ExitCode)). Trying 7-Zip extraction for MSI..."
             7z x "$msiPath" -o$msiInstallDir -y
          }

          # 第三阶段：动态嗅探 modules 文件夹 (深度优先搜索)
          Write-Host "Locating 'modules' directory..."
          $modulesFolder = Get-ChildItem -Path "$msiInstallDir" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1
          
          if ($null -eq $modulesFolder) {
             Write-Error "CRITICAL: Could not find 'modules' folder in MSI. Listing all directories:"
             Get-ChildItem -Path "$msiInstallDir" -Directory -Recurse | Select-Object FullName
             throw "Extraction failed at stage 3."
          }

          $modulesParent = $modulesFolder.FullName
          Write-Host "SUCCESS: Modules located at $modulesParent"

          # 运行最终提取工具
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$modulesParent" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
          body: |
            Automated update to PowerToys ${{ steps.get_version.outputs.version }}
            
            This release contains the split modules for the dynamic installation feature.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository catalog
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: update catalog to ${{ steps.get_version.outputs.version }}"
          git push
