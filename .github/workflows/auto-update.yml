name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *' # 每天午夜运行一次
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  update-modules:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $downloadUrl = ($latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" }).browser_download_url
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$downloadUrl" >> $env:GITHUB_OUTPUT
          Write-Host "Latest version is $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          $currentVersion = $null
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            $currentVersion = $catalog.version
          }
          if ($currentVersion -eq "${{ steps.get_version.outputs.version }}") {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Version already up to date."
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"

      - name: Extract Modules
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Creating layout for PowerToysSetup.exe..."
          # Layout the installer to get the MSI
          Start-Process -FilePath ".\PowerToysSetup.exe" -ArgumentList "/quiet", "/layout", "$env:GITHUB_WORKSPACE\extracted_layout" -Wait
          
          # Find the main x64 MSI
          $msiPath = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\extracted_layout" -Filter "PowerToysSetup-*-x64.msi" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found MSI at: $msiPath"
          
          # Perform Administrative Install to a temporary directory to get the files
          Write-Host "Performing administrative install of MSI..."
          $installDir = "$env:GITHUB_WORKSPACE\temp_install"
          Start-Process -FilePath "msiexec.exe" -ArgumentList "/a", "`"$msiPath`"", "/qb", "TARGETDIR=`"$installDir`"" -Wait
          
          # Find where the 'modules' folder ended up (usually under 'PFiles/PowerToys' in an admin install)
          $modulesParent = Get-ChildItem -Path "$installDir" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Modules parent found at: $modulesParent"
          
          # Run our extraction tool on the temporary install
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$modulesParent" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
          body: |
            Automated update to PowerToys ${{ steps.get_version.outputs.version }}
            
            This release contains the split modules for the dynamic installation feature.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository catalog
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: update catalog to ${{ steps.get_version.outputs.version }}"
          git push
