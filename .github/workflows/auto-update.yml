name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-modules:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $asset = $latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" } | Select-Object -First 1
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          Write-Host "Detected PowerToys version: $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            if ($catalog.version -eq "${{ steps.get_version.outputs.version }}") {
              echo "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "Catalog already at version $version. Skipping."
              return
            }
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading PowerToys installer..."
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"

      - name: Extract Modules (Universal Recursive Extractor)
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        env:
          WIX_ACCEPT_OSMF_EULA: 1
        run: |
          Write-Host "--- Stage 1: Toolchain Setup ---"
          # 强制清理并安装 WiX v5
          dotnet tool uninstall --global wix | Out-Null
          dotnet tool install --global wix --version 5.0.2
          Write-Host "Using WiX version:"
          wix --version

          Write-Host "--- Stage 2: Multi-Engine Extraction ---"
          mkdir raw_payload -Force
          
          # 策略 A: 官方 WiX 提取 (修正参数)
          Write-Host "Attempting Official WiX Extraction..."
          wix burn extract PowerToysSetup.exe -o raw_payload
          
          # 策略 B: 7-Zip 尾部数据爆破 (针对 WiX Bundle 的杀手锏)
          Write-Host "Attempting 7-Zip Tail-Data Extraction..."
          7z x PowerToysSetup.exe -oextract_7z -y -t# 
          
          Write-Host "--- Stage 3: Deep Search and Unpack ---"
          # 合并所有可能的载荷
          $searchPaths = @("raw_payload", "extract_7z")
          $targetMsi = $null
          
          foreach ($p in $searchPaths) {
              if (Test-Path $p) {
                  $msi = Get-ChildItem -Path $p -Filter "*.msi" -Recurse | Select-Object -First 1
                  if ($msi) { $targetMsi = $msi.FullName; break }
              }
          }

          if ($null -eq $targetMsi) {
              Write-Warning "No MSI found. Checking for large binary blobs (CABs/Streams)..."
              $blob = Get-ChildItem -Path $searchPaths -Recurse | Where-Object { $_.Length -gt 50MB } | Sort-Object Length -Descending | Select-Object -First 1
              if ($blob) {
                  Write-Host "Found large blob: $($blob.FullName). Attempting brute force extraction..."
                  7z x "$($blob.FullName)" -ofinal_unpack -y
              }
          } else {
              Write-Host "MSI detected: $targetMsi. Extracting contents..."
              7z x "$targetMsi" -ofinal_unpack -y
          }

          Write-Host "--- Stage 4: Location Radar ---"
          # 终极全盘扫描
          $modulesFolder = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1
          
          if ($null -eq $modulesFolder) {
              Write-Error "CRITICAL: Modules folder not found in any extraction path."
              Write-Host "Listing all directories for post-mortem analysis:"
              Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Directory -Recurse | Select-Object FullName
              throw "Extraction pipeline exhausted."
          }

          $modulesParent = $modulesFolder.FullName
          Write-Host "TARGET ACQUIRED: $modulesParent"

          # 运行提取脚本
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$modulesParent" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
          body: |
            Automated dynamic module distribution for PowerToys ${{ steps.get_version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository Metadata
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: sync catalog to ${{ steps.get_version.outputs.version }}"
          git push
