name: Auto Update PowerToys Modules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决 Node.js 20 弃用警告

jobs:
  update-modules:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Latest PowerToys Release
        id: get_version
        shell: pwsh
        run: |
          $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/PowerToys/releases/latest"
          $version = $latestRelease.tag_name
          $asset = $latestRelease.assets | Where-Object { $_.name -like "PowerToysSetup-*-x64.exe" } | Select-Object -First 1
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "download_url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          Write-Host "Detected PowerToys version: $version"

      - name: Check if Version already exists
        id: check_version
        shell: pwsh
        run: |
          if (Test-Path "dist/catalog.json") {
            $catalog = Get-Content "dist/catalog.json" | ConvertFrom-Json
            if ($catalog.version -eq "${{ steps.get_version.outputs.version }}") {
              echo "skip=true" >> $env:GITHUB_OUTPUT
              return
            }
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      - name: Download Official PowerToys
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading PowerToys installer..."
          Invoke-WebRequest -Uri "${{ steps.get_version.outputs.download_url }}" -OutFile "PowerToysSetup.exe"
          $size = (Get-Item "PowerToysSetup.exe").Length / 1MB
          Write-Host "Downloaded: PowerToysSetup.exe ($([Math]::Round($size, 2)) MB)"

      - name: Extract Modules (The 7-Zip Failsafe Chain)
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Write-Host "Stage 1: Breaking the WiX Burn bundle container..."
          # 使用 7z 直接暴力解开 exe。7z 预装在 GitHub Windows Runner 中，无需安装，无授权问题。
          7z x PowerToysSetup.exe -oextract_s1 -y
          
          Write-Host "Stage 2: Locating the payload container (MSI or attached data)..."
          # 寻找提取物中最大的文件或 MSI。WiX 捆绑包的真正载荷通常叫 AttachedContainer 或 .msi
          $payload = Get-ChildItem -Path "extract_s1" -Recurse | Sort-Object Length -Descending | Select-Object -First 1
          Write-Host "Identified payload: $($payload.FullName) ($($payload.Length / 1MB) MB)"
          
          Write-Host "Stage 3: Extracting files from payload..."
          7z x "$($payload.FullName)" -oextract_s2 -y
          
          Write-Host "Stage 4: Deep scanning for 'modules' directory..."
          # 全量扫描所有子目录，寻找含有 'modules' 的文件夹
          $modulesFolder = Get-ChildItem -Path "extract_s2" -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "modules") } | Select-Object -First 1
          
          if ($null -eq $modulesFolder) {
             Write-Error "CRITICAL ERROR: Failed to find 'modules' folder in the entire extraction tree."
             Write-Host "=== Full Extraction Tree for Debugging ==="
             Get-ChildItem -Path "extract_s2" -Recurse | Select-Object FullName
             throw "Extraction failed: Target directory missing."
          }

          $modulesParent = $modulesFolder.FullName
          Write-Host "SUCCESS: Modules located at: $modulesParent"

          # 运行最终提取工具
          .\tools\PowerToys-Extractor.ps1 -SourcePath "$modulesParent" -DistPath "publish_dist" -Version "${{ steps.get_version.outputs.version }}" -BaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/"

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
          body: |
            Automated dynamic module distribution for PowerToys ${{ steps.get_version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository Metadata
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: sync catalog to ${{ steps.get_version.outputs.version }}"
          git push

      - name: Create Release and Upload Assets
        if: steps.check_version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            publish_dist/modules/*.zip
            publish_dist/catalog.json
          body: |
            Automated update to PowerToys ${{ steps.get_version.outputs.version }}
            
            This release contains the split modules for the dynamic installation feature.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repository catalog
        if: steps.check_version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Copy-Item "publish_dist/catalog.json" "dist/catalog.json" -Force
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/catalog.json
          git commit -m "chore: update catalog to ${{ steps.get_version.outputs.version }}"
          git push
